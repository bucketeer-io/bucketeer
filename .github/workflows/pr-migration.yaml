name: pr-migration

on:
  pull_request:
    branches:
      - main
    paths:
      - "migration/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ATLAS_VERSION: v1.0.0

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          version: ${{ env.ATLAS_VERSION }}

      - name: Validate migration files
        run: make migration-validate
        
      - name: Check atlas.sum is up to date
        run: make migration-hash-check
