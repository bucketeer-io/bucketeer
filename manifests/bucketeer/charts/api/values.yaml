image:
  repository: ghcr.io/bucketeer-io/bucketeer-api
  pullPolicy: IfNotPresent
fullnameOverride: "api"
namespace: default
env:
  project:
  gcpEnabled: true
  profile: true
  # Database configuration
  operationalDatabase:
    type: "mysql"
    mysql:
      user:
      pass:
      host:
      port: 3306
      name:
    postgres:
      user:
      pass:
      host:
      port: 5432
      name:
  enablePprof: false
  pprofAddr: 127.0.0.1:6060
  pubsubEmulatorHost:
  goalTopic:
  evaluationTopic:
  metricsTopic:
  publishNumGoroutines: 200
  publishTimeout: 1m
  pubSubType: google
  pubSubRedisAddr:
  pubSubRedisPoolSize:
  pubSubRedisMinIdle:
  pubSubRedisMode: auto
  redis:
    serverName:
    poolMaxIdle: 25
    poolMaxActive: 25
    addr:
    mode: auto
  oldestEventTimestamp:
  furthestEventTimestamp:
  # Grace window applied to the diff filters for:
  #   - GetFeatureFlags: UpdatedAt >= RequestedAt - grace
  #   - GetEvaluations: UpdatedAt > evaluatedAt - grace
  # Re-includes recently updated flags that the previous diff response may
  # have missed due to L2 cache propagation lag under rapid back-to-back
  # updates (partial-diff trap). Leave unset to use the server default
  # (10m). Increase if SDK pods continue to observe stale flags; decrease
  # to reduce diff response size.
  featureFlagDiffGracePeriod:
  # Bounded worker pool for processing metrics events. Leave unset to use
  # the Go defaults (4 workers, 4096-batch buffered queue). Increase
  # metricsWorkers if bucketeer_gateway_api_metrics_overflow_total is
  # sustained > 0; increase metricsQueueSize if
  # bucketeer_gateway_api_metrics_queue_depth approaches capacity during bursts.
  metricsWorkers:
  metricsQueueSize:
  # Topic on which the subscriber service announces L2 cache refreshes.
  # Each api pod subscribes to this topic and evicts its L1 (in-memory)
  # cache entries on each announcement. Both supported PubSub backends
  # (Google Pub/Sub and Redis Streams) auto-create the topic on first
  # publish, so no pre-provisioning step is required.
  cacheInvalidationTopic:
  sseHeartbeatInterval: 25s
  sseMaxConnections: 10000
  logLevel: info
  grpcGatewayPort: 9089
  port: 9090
  metricsPort: 9002
  featureService: localhost:9001
  accountService: localhost:9001
  pushService: localhost:9001
  codeRefService: localhost:9001
  auditLogService: localhost:9001
  tagService: localhost:9001
  teamService: localhost:9001
  subscriptionService: localhost:9001
  experimentService: localhost:9001
  eventCounterService: localhost:9001
  environmentService: localhost:9001
  traceSamplingProbability: 0.0001
affinity: {}
nodeSelector: {}
priorityClassName: ""
pdb:
  enabled:
  maxUnavailable: 20%
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 10%
    maxSurge: 1
hpa:
  enabled:
  minReplicas:
  maxReplicas:
  metrics:
    cpu:
      targetAverageUtilization:
tls:
  bucketeerJP:
    secrets:
  service:
    secret:
serviceToken:
  secret:
envoy:
  image:
    repository: envoyproxy/envoy
    tag: v1.34.1
    pullPolicy: IfNotPresent
  lbPolicy: LEAST_REQUEST
  config:
  port: 9000
  adminPort: 8001
  resources: {}
  circuitBreaker:
    maxPendingRequests: 3500
    maxRequests: 3500
    maxConnections: 3500
  sseCircuitBreaker:
    maxRequests: 20000
    maxConnections: 20000
    # Let clients access another server without pending
    # because SSE is long-lived.
    maxPendingRequests: 0
service:
  type: ClusterIP
  externalPort: 9000
sse:
  backendConfig:
    timeoutSec: 86400
ingress:
  name: api
  host:
  staticIPName:
  rulePaths:
    - path: /v1/gateway/stream_evaluations
      pathType: ImplementationSpecific
      backend:
        service:
          name: api-sse
          port:
            number: 9000
    - pathType: ImplementationSpecific
      backend:
        service:
          name: api
          port:
            number: 9000
terminationGracePeriodSeconds: 60
health:
  startupProbe:
    periodSeconds: 3
    failureThreshold: 20
    timeoutSeconds: 5
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 8
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 3
    failureThreshold: 1
    timeoutSeconds: 5
resources: {}
serviceAccount:
  annotations: {}
gcpMultiCluster:
  configCluster: false
  enabled: false
  service:
    name: api-multi-cluster-service
  sseService:
    name: api-sse-multi-cluster-service
  ingress:
    name: api-multi-cluster-ingress
    host:
    staticIPName:
    secretName:
    rulePaths:
      - path: /v1/gateway/stream_evaluations
        backend:
          serviceName: api-sse-multi-cluster-service
          servicePort: 9000
      - path: /
        backend:
          serviceName: api-multi-cluster-service
          servicePort: 9000
