syntax = "proto3";

package bucketeer.batch;
option go_package = "github.com/bucketeer-io/bucketeer/v2/proto/batch";

enum BatchJob {
  ExperimentStatusUpdater = 0;
  ExperimentRunningWatcher = 1;
  FeatureStaleWatcher = 2;
  reserved 3;  // MauCountWatcher
  reserved "MauCountWatcher";
  DatetimeWatcher = 4;
  EventCountWatcher = 5;
  DomainEventInformer = 6;
  RedisCounterDeleter = 7;
  ProgressiveRolloutWatcher = 8;
  ExperimentCalculator = 9;
  reserved 10;  // MauSummarizer
  reserved "MauSummarizer";
  reserved 11;  // MauPartitionDeleter
  reserved "MauPartitionDeleter";
  reserved 12;  // MauPartitionCreator
  reserved "MauPartitionCreator";
  FeatureFlagCacher = 13;
  SegmentUserCacher = 14;
  ApiKeyCacher = 15;
  AutoOpsRulesCacher = 16;
  ExperimentCacher = 17;
  TagDeleter = 18;
  FeatureAutoArchiver = 19;
  ScheduledFlagChangeExecutor = 20;
  MonthlySummarizer = 21;
}

message BatchJobRequest {
  BatchJob job = 1;
}

message BatchJobResponse {}

service BatchService {
  rpc ExecuteBatchJob(BatchJobRequest) returns (BatchJobResponse) {}
}