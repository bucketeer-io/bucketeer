apiVersion: v1
kind: Service
metadata:
  name: {{ include "localenv.fullname" . }}-redis
  labels:
    {{- include "localenv.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    {{- include "localenv.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "localenv.fullname" . }}-redis
  labels:
    {{- include "localenv.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "localenv.fullname" . }}-redis-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "localenv.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "localenv.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
        imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --appendfsync
        - "everysec"
        - --no-appendfsync-on-rewrite
        - "no"
        - --auto-aof-rewrite-percentage
        - "100"
        - --auto-aof-rewrite-min-size
        - "64mb"
        - --save
        - "900"
        - "1"
        - --save
        - "300"
        - "10"
        - --save
        - "60"
        - "10000"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.redis.storageClass }}
      storageClassName: {{ .Values.redis.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.redis.storageSize | default "8Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "localenv.fullname" . }}-redis-headless
  labels:
    {{- include "localenv.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    {{- include "localenv.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
