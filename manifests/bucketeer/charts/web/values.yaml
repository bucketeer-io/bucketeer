image:
  repository: ghcr.io/bucketeer-io/bucketeer-web
  pullPolicy: IfNotPresent
fullnameOverride: "web"
namespace: default
env:
  cloudService:
  profile: true
  bucketeerTestEnabled:
  demoSiteEnabled: false
  gcpEnabled: true
  enablePprof: false
  pprofAddr: 127.0.0.1:6060
  bigqueryQuerierEmulatorHost:
  pubsubEmulatorHost:
  project:
  pubSubType: google
  pubSubRedisAddr:
  pubSubRedisPoolSize:
  pubSubRedisMinIdle:
  mysqlUser:
  mysqlPass:
  mysqlHost:
  mysqlPort: 3306
  mysqlDbName:
  persistentRedis:
    serverName:
    addr:
    poolMaxIdle: 25
    poolMaxActive: 25
  nonPersistentRedis:
    serverName:
    addr:
    poolMaxIdle: 25
    poolMaxActive: 25
  bigQueryDataSet:
  bigQueryDataLocation:
  domainTopic:
  bulkSegmentUsersReceivedTopic:
  accountService: localhost:9001
  authService: localhost:9001
  batchService: localhost:9001
  environmentService: localhost:9001
  experimentService: localhost:9001
  featureService: localhost:9001
  autoOpsService: localhost:9001
  grpcGatewayPort: 9089
  healthCheckServicePort: 8000
  accountServicePort: 9091
  authServicePort: 9092
  auditLogServicePort: 9093
  autoOpsServicePort: 9094
  environmentServicePort: 9095
  eventCounterServicePort: 9096
  experimentServicePort: 9097
  featureServicePort: 9098
  notificationServicePort: 9100
  pushServicePort: 9101
  webConsoleServicePort: 9102
  dashboardServicePort: 9103
  tagServicePort: 9104
  coderefServicePort: 9105
  unifiedGatewayPort: 9106
  metricsPort: 9002
  timezone: UTC
  emailFilter:
  logLevel: info
  googleTagManagerId:
  apiEndpoint:
  accessTokenTTL: 10m
  refreshTokenTTL: 168h
affinity: {}
nodeSelector: {}
pdb:
  enabled:
  maxUnavailable: 50%
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 10%
    maxSurge: 1
hpa:
  enabled:
  minReplicas:
  maxReplicas:
  metrics:
    cpu:
      targetAverageUtilization:
tls:
  service:
    secret:
  bucketeerJP:
    secrets:
serviceToken:
  secret:
oauth:
  key:
    secret:
  issuer:
  audience: bucketeer
  google:
    issuer:
    clientId:
    clientSecret:
    redirectUrls:
  password:
    enabled:
    policy:
      minLength: 8
      requireUppercase: true
      requireLowercase: true
      requireNumbers: true
      requireSymbols: true
    tokens:
      resetTTL: 1800s
      setupTTL: 24h
    urls:
      resetPath:
      setupPath:
      tokenParam:

  email:
    enabled:
    provider:
    smtp:
      host:
      port:
      username:
      password:
    sendgrid:
      apiKey:
    ses:
      region:
      accessKey:
      secretKey:
    mailersend:
      apiKey:
    sender:
      email:
      name:
    baseURL:
    templates:
      en:
        passwordChanged:
          subject: "Your Bucketeer Password Was Changed"
          body: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="x-apple-disable-message-reformatting"><title>Password Changed</title></head><body style="margin:0;padding:0;background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,''Segoe UI'',Roboto,Helvetica,Arial,sans-serif;line-height:1.6;"><div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">If you didn''t make this change, contact support immediately.</div><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr><td align="center" style="padding:24px 12px;"><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="width:100%;max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><tr><td style="padding:32px;background:#ffffff;"><img src="{{webConsoleEndpoint}}/img/bucketeer-logo-primary.png" alt="Bucketeer" width="205" height="48" style="display:block;margin-bottom:24px;" /><p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;">Hello, {{userEmail}}.</p><p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;">We wanted to let you know that your Bucketeer password has changed.</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:16px 20px;background:#FDFBE8;border-left:4px solid #FFB802;border-radius:6px;"><p style="margin:0;font-size:14px;color:#725201;line-height:1.5;"><strong>Security notice:</strong> If you didn''t make this change, please contact your administrator immediately.</p></td></tr></table><p style="margin:0 0 12px 0;font-size:15px;font-weight:600;color:#4b5563;">For your security:</p><ul style="margin:0 0 24px 0;padding-left:20px;font-size:14px;color:#4b5563;line-height:1.8;"><li style="margin-bottom:8px;">Use a strong, unique password</li><li style="margin-bottom:8px;">Never share your password with anyone</li><li>Consider using a password manager</li></ul><p style="margin:0;font-size:14px;color:#4b5563;">Thank you for keeping your account secure.</p></td></tr></table></td></tr></table></body></html>'
        passwordSetup:
          subject: "Complete your Bucketeer account setup"
          body: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="x-apple-disable-message-reformatting"><title>Complete your Bucketeer account setup</title></head><body style="margin:0;padding:0;background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,''Segoe UI'',Roboto,Helvetica,Arial,sans-serif;line-height:1.6;"><div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">Finish setting up your sign-in to access the console.</div><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr><td align="center" style="padding:24px 12px;"><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="width:100%;max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><tr><td style="padding:32px;background:#ffffff;"><img src="{{webConsoleEndpoint}}/img/bucketeer-logo-primary.png" alt="Bucketeer" width="205" height="48" style="display:block;margin-bottom:24px;" /><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">Hello, {{userEmail}}.</p><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">You''ve been invited to join <strong>Bucketeer</strong>, a feature flag and A/B testing platform.</p><p style="margin:0 0 20px 0;font-size:15px;color:#4b5563;">To complete your account setup, click on the button below.</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px 0;"><tr><td align="center"><a href="{{setupURL}}" style="background:#5B21B6;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:6px;display:inline-block;font-weight:600;font-size:15px;">Complete Account Setup</a></td></tr></table><p style="margin:0 0 8px 0;font-size:13px;color:#4b5563;">Or copy and paste this link into your browser:</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:12px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;word-break:break-all;font-size:13px;color:#4b5563;">{{setupURL}}</td></tr></table><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:16px 20px;background:#ECF6FD;border-left:4px solid #399CE4;border-radius:6px;"><p style="margin:0 0 12px 0;font-size:14px;font-weight:600;color:#23405D;">Important</p><ul style="margin:0;padding-left:20px;font-size:14px;color:#29577F;line-height:1.8;"><li style="margin-bottom:8px;">This link will expire on {{expirationTime}} for security reasons.</li><li>If you didn''t request this, you can safely ignore this message.</li></ul></td></tr></table><p style="margin:0;font-size:14px;color:#4b5563;">If you have any questions, please contact your administrator.</p></td></tr></table></td></tr></table></body></html>'
        passwordReset:
          subject: "Reset Your Bucketeer Password"
          body: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="x-apple-disable-message-reformatting"><title>Reset Password</title></head><body style="margin:0;padding:0;background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,''Segoe UI'',Roboto,Helvetica,Arial,sans-serif;line-height:1.6;"><div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">Reset your password to regain access to your account.</div><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr><td align="center" style="padding:24px 12px;"><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="width:100%;max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><tr><td style="padding:32px;background:#ffffff;"><img src="{{webConsoleEndpoint}}/img/bucketeer-logo-primary.png" alt="Bucketeer" width="205" height="48" style="display:block;margin-bottom:24px;" /><p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;">Hello, {{userEmail}}.</p><p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;">We received a request to reset your Bucketeer password. Click the button below to create a new password:</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px 0;"><tr><td align="center"><a href="{{resetURL}}" style="background:#5B21B6;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:6px;display:inline-block;font-weight:600;font-size:15px;">Reset Password</a></td></tr></table><p style="margin:0 0 8px 0;font-size:13px;color:#4b5563;">Or copy and paste this link into your browser:</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:12px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;word-break:break-all;font-size:13px;color:#4b5563;">{{resetURL}}</td></tr></table><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:16px 20px;background:#ECF6FD;border-left:4px solid #399CE4;border-radius:6px;"><p style="margin:0 0 12px 0;font-size:14px;font-weight:600;color:#23405D;">Security Information:</p><ul style="margin:0;padding-left:20px;font-size:14px;color:#29577F;line-height:1.8;"><li style="margin-bottom:8px;">This link will expire on {{expirationTime}} for security reasons.</li><li style="margin-bottom:8px;">If you did not request this password reset, please ignore this email.</li><li>Your password will remain unchanged until you create a new one.</li></ul></td></tr></table><p style="margin:0;font-size:14px;color:#4b5563;">If you have any questions, please contact your system administrator.</p></td></tr></table></td></tr></table></body></html>'
        welcome:
          subject: "You've been invited to join Bucketeer"
          body: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="x-apple-disable-message-reformatting"><title>You''ve been invited to join Bucketeer</title></head><body style="margin:0;padding:0;background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,''Segoe UI'',Roboto,Helvetica,Arial,sans-serif;line-height:1.6;"><div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">Sign in with the authentication method configured for your account.</div><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr><td align="center" style="padding:24px 12px;"><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="width:100%;max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><tr><td style="padding:32px;background:#ffffff;"><img src="{{webConsoleEndpoint}}/img/bucketeer-logo-primary.png" alt="Bucketeer" width="205" height="48" style="display:block;margin-bottom:24px;" /><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">Hello, {{userEmail}}.</p><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">You''ve been invited to join <strong>Bucketeer</strong>, a feature flag and A/B testing platform.</p><p style="margin:0 0 20px 0;font-size:15px;color:#4b5563;">Use the link below to access the Bucketeer console and sign in with the authentication method configured for your account.</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 20px 0;"><tr><td align="center"><a href="{{webConsoleEndpoint}}" style="background:#5B21B6;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:6px;display:inline-block;font-weight:600;font-size:15px;">Open Bucketeer Console</a></td></tr></table><p style="margin:0 0 8px 0;font-size:13px;color:#4b5563;">Or copy and paste this link into your browser:</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:12px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;word-break:break-all;font-size:13px;color:#4b5563;">{{webConsoleEndpoint}}</td></tr></table><p style="margin:16px 0 0 0;font-size:14px;color:#4b5563;">Bucketeer Team.</p></td></tr></table></td></tr></table></body></html>'
      ja:
        passwordChanged:
          subject: "パスワードが正常に変更されました"
          body: '<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;color:#333}.container{max-width:600px;margin:0 auto;padding:20px}.alert{background:#fff3cd;padding:15px;border-radius:5px;margin:20px 0}</style></head><body><div class="container"><h1>✅ パスワードが正常に変更されました</h1><p>こんにちは、</p><p>このメールは、Bucketeerのパスワードが正常に変更されたことを確認するものです。</p><div class="alert"><strong>セキュリティ通知：</strong> この変更を行っていない場合は、すぐにシステム管理者にお問い合わせください。</div><p>アカウントのセキュリティを保つためのご協力をありがとうございます。</p></div></body></html>'
        passwordSetup:
          subject: "Bucketeerアカウント設定のご案内"
          body: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="x-apple-disable-message-reformatting"><title>Bucketeerアカウント設定のご案内</title></head><body style="margin:0;padding:0;background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,''Segoe UI'',Roboto,Helvetica,Arial,sans-serif;line-height:1.6;"><div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">アカウント設定を完了するにはコンソールへアクセスしてください。</div><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr><td align="center" style="padding:24px 12px;"><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="width:100%;max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><tr><td style="padding:32px;background:#ffffff;"><img src="{{webConsoleEndpoint}}/img/bucketeer-logo-primary.png" alt="Bucketeer" width="205" height="48" style="display:block;margin-bottom:24px;" /><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">{{userEmail}} 様、</p><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">フィーチャーフラグ & A/B テストプラットフォーム「<strong>Bucketeer</strong>」への招待が届いています。</p><p style="margin:0 0 20px 0;font-size:15px;color:#4b5563;">以下のボタンよりアカウント設定を完了してください。</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px 0;"><tr><td align="center"><a href="{{setupURL}}" style="background:#5B21B6;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:6px;display:inline-block;font-weight:600;font-size:15px;">アカウント設定を完了する</a></td></tr></table><p style="margin:0 0 8px 0;font-size:13px;color:#4b5563;">または、このリンクをブラウザにコピー＆ペーストしてください：</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:12px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;word-break:break-all;font-size:13px;color:#4b5563;">{{setupURL}}</td></tr></table><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:16px 20px;background:#ECF6FD;border-left:4px solid #399CE4;border-radius:6px;"><p style="margin:0 0 12px 0;font-size:14px;font-weight:600;color:#23405D;">重要</p><ul style="margin:0;padding-left:20px;font-size:14px;color:#29577F;line-height:1.8;"><li style="margin-bottom:8px;">このリンクはセキュリティ上、{{expirationTime}} に有効期限が切れます。</li><li>このメールに心当たりがない場合は、破棄してください。</li></ul></td></tr></table><p style="margin:0;font-size:14px;color:#4b5563;">ご不明な点がありましたら、管理者へお問い合わせください。</p></td></tr></table></td></tr></table></body></html>'
        passwordReset:
          subject: "Bucketeerパスワードのリセット"
          body: '<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;color:#333}.container{max-width:600px;margin:0 auto;padding:20px}.button{display:inline-block;padding:12px 24px;background:#dc3545;color:white;text-decoration:none;border-radius:5px}.warning{background:#f8d7da;padding:15px;border-radius:5px;margin:20px 0}</style></head><body><div class="container"><h1>🔒 Bucketeerパスワードのリセット</h1><p>こんにちは、</p><p>Bucketeerパスワードのリセット要求を受け取りました。新しいパスワードを作成するには下のボタンをクリックしてください：</p><p style="text-align:center;margin:30px 0"><a href="{{resetURL}}" class="button">パスワードをリセット</a></p><p>または、このリンクをコピーして貼り付けてください：{{resetURL}}</p><div class="warning"><strong>セキュリティ情報：</strong> このリンクは{{expirationTime}}で期限切れになります。このパスワードリセットを要求していない場合は、このメールを無視してください。新しいパスワードを作成するまで、パスワードは変更されません。</div></div></body></html>'
        welcome:
          subject: "Bucketeerへのご招待"
          body: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="x-apple-disable-message-reformatting"><title>Bucketeerへのご招待</title></head><body style="margin:0;padding:0;background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,''Segoe UI'',Roboto,Helvetica,Arial,sans-serif;line-height:1.6;"><div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">アカウントに設定されている認証方法でサインインしてください。</div><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr><td align="center" style="padding:24px 12px;"><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="width:100%;max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><tr><td style="padding:32px;background:#ffffff;"><img src="{{webConsoleEndpoint}}/img/bucketeer-logo-primary.png" alt="Bucketeer" width="205" height="48" style="display:block;margin-bottom:24px;" /><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">{{userEmail}} 様、</p><p style="margin:0 0 16px 0;font-size:15px;color:#4b5563;">フィーチャーフラグ & A/B テストプラットフォーム「<strong>Bucketeer</strong>」への招待が届いています。</p><p style="margin:0 0 20px 0;font-size:15px;color:#4b5563;">以下のボタンよりコンソールへアクセスし、アカウントに設定されている認証方法でサインインしてください。</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 20px 0;"><tr><td align="center"><a href="{{webConsoleEndpoint}}" style="background:#5B21B6;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:6px;display:inline-block;font-weight:600;font-size:15px;">Bucketeer コンソールを開く</a></td></tr></table><p style="margin:0 0 8px 0;font-size:13px;color:#4b5563;">または、このリンクをブラウザにコピー＆ペーストしてください：</p><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 24px 0;"><tr><td style="padding:12px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;word-break:break-all;font-size:13px;color:#4b5563;">{{webConsoleEndpoint}}</td></tr></table><p style="margin:16px 0 0 0;font-size:14px;color:#4b5563;">Bucketeerチーム</p></td></tr></table></td></tr></table></body></html>'
  demoSignIn:
    enabled:
    email:
    password:
    organizationId:
    organizationOwnerEmail:
    projectId:
    environmentId:
    isSystemAdmin:
webhook:
  baseURL:
  kmsResourceName:
envoy:
  image:
    repository: envoyproxy/envoy
    tag: v1.34.1
    pullPolicy: IfNotPresent
  lbPolicy: LEAST_REQUEST
  config:
  grpcPort: 9000
  httpPort: 9003
  adminPort: 8001
  resources: {}
service:
  type: ClusterIP
  grpcPort: 9000
  httpPort: 9003
health:
  startupProbe:
    periodSeconds: 3
    failureThreshold: 20
    timeoutSeconds: 5
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 8
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 3
    failureThreshold: 1
    timeoutSeconds: 5
resources: {}
serviceAccount:
  annotations: {}
ingress:
  name: web
  host:
  staticIPName:
  rulePaths:
    - pathType: ImplementationSpecific
      backend:
        service:
          name: web
          port:
            number: 9003
gcpMultiCluster:
  configCluster: false
  enabled: false
  service:
    name: web-multi-cluster-service
  ingress:
    name: web-multi-cluster-ingress
    host:
    staticIPName:
    tls:
      secrets:
    rulePaths:
      - path: /
        backend:
          serviceName: web-multi-cluster-service
          servicePort: 9003
terminationGracePeriodSeconds: 60
