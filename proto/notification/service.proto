syntax = "proto3";

package bucketeer.notification;
option go_package = "github.com/bucketeer-io/bucketeer/v2/proto/notification";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "proto/notification/notification.proto";

// NOTE: request/response bodies are intentionally left empty for now; fields
// will be filled in once the notification center design is finalized.

message ListNotificationsRequest {}

message ListNotificationsResponse {}

message GetNotificationRequest {}

message GetNotificationResponse {}

message GetNotificationUnreadCountRequest {}

message GetNotificationUnreadCountResponse {}

message MarkNotificationsAsReadRequest {}

message MarkNotificationsAsReadResponse {}

message MarkAllNotificationsAsReadRequest {}

message MarkAllNotificationsAsReadResponse {}

message ListDraftAdminNotificationsRequest {
  enum OrderBy {
    DEFAULT = 0;
    CREATED_AT = 1;
    UPDATED_AT = 2;
  }
  enum OrderDirection {
    ASC = 0;
    DESC = 1;
  }
  int64 page_size = 1;
  string cursor = 2;
  OrderBy order_by = 3;
  OrderDirection order_direction = 4;
  // Keyword matched against localization titles and contents.
  string search_keyword = 5;
}

message ListDraftAdminNotificationsResponse {
  // Drafts with all localizations attached (editor view).
  repeated Notification notifications = 1;
  string next_cursor = 2;
  int64 total_count = 3;
}

message CreateNotificationRequest {
  // At least one localization is required; languages must be unique.
  repeated NotificationLocalization localizations = 1;
}

message CreateNotificationResponse {
  Notification notification = 1;
}

message UpdateNotificationRequest {}

message UpdateNotificationResponse {}

message PublishNotificationRequest {}

message PublishNotificationResponse {}

message DeleteNotificationRequest {}

message DeleteNotificationResponse {}

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest)
      returns (ListNotificationsResponse) {
    option (google.api.http) = {
      get: "/v1/notifications"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List",
      description: "List published notifications with keyword search, read/unread filter, published date range filter, sorting, and pagination.",
      tags: "notification",
      operation_id: "web.v1.notification.list",
      responses: {
        key: "400"
        value: {
          description: "Returned for bad requests that may have failed validation."
          schema: { json_schema: { ref: ".google.rpc.Status" } }
          examples: {
            key: "application/json"
            value: '{ "code": 3, "message": "invalid arguments error", "details": [] }'
          }
        }
      },
      responses: {
        key: "401"
        value: {
          description: "Request could not be authenticated (authentication required)."
          schema: { json_schema: { ref: ".google.rpc.Status" } }
          examples: {
            key: "application/json"
            value: '{ "code": 16, "message": "not authenticated", "details": [] }'
          }
        }
      }
    };
  }

